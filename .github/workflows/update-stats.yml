name: Update GitHub Stats

on:
  schedule:
    - cron: "0 2 * * *"   # 每天 UTC 02:00 自动运行
  workflow_dispatch:         # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # ❌ 原版写法错误：permissions 必须换行缩进

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ❌ 原版使用了不存在的 Action: readme-tools/github-readme-stats-action@v1
      # ✅ 改用 curl 直接请求官方 anuraghazra API，更稳定可靠
      - name: 创建 profile 目录
        run: mkdir -p profile

      - name: 生成 Stats 主卡片
        run: |
          curl -s \
            "https://github-readme-stats.vercel.app/api?username=Sy1vian&show_icons=true&include_all_commits=true&theme=vue-dark&hide_border=true" \
            -o profile/STAUS.svg
          # 转为 PNG（与 README 中引用的文件名保持一致）
          npx --yes svgexport profile/STAUS.svg profile/STAUS.svg 2x

      - name: 生成 Top Languages 卡片
        run: |
          curl -s \
            "https://github-readme-stats.vercel.app/api/top-langs?username=Sy1vian&layout=compact&theme=vue-dark&hide_border=true" \
            -o profile/Most_Languages.svg
          npx --yes svgexport profile/Most_Languages.svg profile/Most_Languages.svg 2x

      - name: 提交更新
        run: |
          # ❌ 原版 git config 里混入了 Markdown 链接语法，会导致命令报错
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/STAUS.png profile/Most_Languages.png
          # || true 防止"无变化时"因 exit 1 导致整个 job 失败
          git commit -m "chore: update GitHub stats cards [skip ci]" || true
          git push
