name: Update GitHub Stats

on:
  schedule:
    - cron: "0 2 * * *"     # 每天北京时间早上10点左右更新
  workflow_dispatch:        # 允许你手动点击更新

jobs:
  update:
    runs-on: ubuntu-latest
    permissions: contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 生成 Stats 主卡片
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=Sy1vian&show_icons=true&include_all_commits=true&theme=radical&hide_border=true
          path: stats.svg

      - name: 生成 Top Languages 卡片
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=Sy1vian&layout=compact&theme=radical&hide_border=true
          path: top-langs.svg

      - name: 提交更新
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add stats.svg top-langs.svg
          git commit -m "Update stats cards" || exit 0
          git push
