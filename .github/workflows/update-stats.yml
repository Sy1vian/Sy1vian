name: Update GitHub Stats

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 创建 profile 目录
        run: mkdir -p profile

      - name: 生成 Stats 主卡片
        run: |
          curl -s \
            "https://github-readme-stats.vercel.app/api?username=Sy1vian&show_icons=true&include_all_commits=true&theme=vue-dark&hide_border=true" \
            -o profile/STAUS.svg
          # curl 下载的就是 SVG，不需要任何转换，直接保存即可

      - name: 生成 Top Languages 卡片
        run: |
          curl -s \
            "https://github-readme-stats.vercel.app/api/top-langs?username=Sy1vian&layout=compact&theme=vue-dark&hide_border=true" \
            -o profile/Most_Languages.svg

      - name: 提交更新
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/STAUS.svg profile/Most_Languages.svg   # ✅ 对应 SVG 文件名
          git commit -m "chore: update GitHub stats cards [skip ci]" || true
          git push
