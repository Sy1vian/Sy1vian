name: Update GitHub Stats

on:
  schedule:
    - cron: "0 2 * * *"     # 每天北京时间早上10点自动更新
  workflow_dispatch:        # 手动运行
  push:                     # 临时用来激活（后面可以删）
    branches: [ main ]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions: contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 生成 Stats 主卡片
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=Sy1vian&show_icons=true&include_all_commits=true&theme=radical&hide_border=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 生成 Top Languages 卡片
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=Sy1vian&layout=compact&theme=radical&hide_border=true
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg profile/top-langs.svg
          git commit -m "Update GitHub stats cards" || exit 0
          git push
